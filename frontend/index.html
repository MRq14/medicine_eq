<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MedEq RAG Workbench</title>
  <style>
    :root {
      --bg: #f4f7fa;
      --panel: #ffffff;
      --panel-soft: #eef4f8;
      --panel-strong: #e3ebf2;
      --text: #17212b;
      --text-muted: #536273;
      --text-soft: #7a8795;
      --line: #d7e0ea;
      --line-soft: #e8eef4;
      --primary: #176b87;
      --primary-dark: #12566c;
      --primary-soft: #e4f3f7;
      --verify: #2f855a;
      --verify-soft: #e5f4ec;
      --warn: #b7791f;
      --warn-soft: #fff6df;
      --error: #b42318;
      --error-soft: #ffebe8;
      --shadow: 0 14px 36px rgba(23, 33, 43, 0.08);
      --mono: SFMono-Regular, ui-monospace, Menlo, Consolas, monospace;
      --sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
    }

    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }
    button:disabled { cursor: not-allowed; opacity: 0.58; }

    .app {
      display: grid;
      grid-template-rows: 56px 1fr;
      min-height: 100vh;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 0 20px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.94);
      backdrop-filter: blur(14px);
      z-index: 5;
    }

    .brand-lockup {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 260px;
    }

    .mark {
      width: 30px;
      height: 30px;
      display: grid;
      place-items: center;
      border-radius: 7px;
      background: var(--primary);
      color: #fff;
      font-weight: 800;
      letter-spacing: 0;
    }

    .app-title {
      font-size: 15px;
      font-weight: 720;
      line-height: 1.2;
    }

    .app-subtitle {
      color: var(--text-soft);
      font-size: 12px;
      margin-top: 2px;
    }

    .status-strip {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-width: 0;
      color: var(--text-muted);
      font-size: 13px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--warn);
      box-shadow: 0 0 0 3px var(--warn-soft);
    }

    .dot.ok {
      background: var(--verify);
      box-shadow: 0 0 0 3px var(--verify-soft);
    }

    .top-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      min-width: 260px;
    }

    .lang-switch,
    .mode-switch {
      display: inline-grid;
      grid-auto-flow: column;
      gap: 3px;
      padding: 3px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-soft);
    }

    .seg-btn {
      min-height: 30px;
      padding: 0 10px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 650;
    }

    .seg-btn.active {
      background: var(--panel);
      color: var(--primary-dark);
      box-shadow: 0 1px 4px rgba(23, 33, 43, 0.08);
    }

    .workspace {
      display: grid;
      grid-template-columns: 300px 1fr;
      min-height: 0;
    }

    .panel {
      min-height: 0;
      background: var(--panel);
      border-right: 1px solid var(--line);
      overflow: hidden;
    }


    .panel-head {
      min-height: 58px;
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--line-soft);
    }

    .section-title {
      color: var(--text);
      font-size: 13px;
      font-weight: 760;
    }

    .section-note {
      color: var(--text-soft);
      font-size: 12px;
      line-height: 1.4;
      margin-top: 3px;
    }

    .sidebar-body,
    .evidence-body {
      height: calc(100vh - 114px);
      overflow: auto;
      padding: 14px;
    }

    .field-label {
      display: block;
      color: var(--text-muted);
      font-size: 11px;
      font-weight: 760;
      margin-bottom: 6px;
      text-transform: uppercase;
    }

    .select,
    .input {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      color: var(--text);
      outline: 0;
    }

    .select { padding: 0 10px; }
    .input { padding: 0 11px; }

    .select:focus,
    .input:focus,
    .question-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(23, 107, 135, 0.12);
    }

    .upload-box {
      margin-top: 14px;
      padding: 12px;
      border: 1px dashed #b8c8d8;
      border-radius: 8px;
      background: #fbfdff;
      transition: 0.15s ease;
    }

    .upload-box.drag,
    .upload-box:hover {
      border-color: var(--primary);
      background: var(--primary-soft);
    }

    .upload-box input { display: none; }

    .upload-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      cursor: pointer;
    }

    .upload-main {
      color: var(--text);
      font-size: 13px;
      font-weight: 700;
    }

    .upload-sub {
      color: var(--text-soft);
      font-size: 12px;
      margin-top: 2px;
    }

    .upload-action {
      color: var(--primary);
      font-size: 12px;
      font-weight: 760;
      white-space: nowrap;
    }

    .message {
      display: none;
      margin-top: 10px;
      padding: 9px 10px;
      border-radius: 7px;
      font-size: 12px;
      line-height: 1.35;
    }

    .message.show { display: block; }
    .message.ok { background: var(--verify-soft); color: #1f6845; }
    .message.info { background: var(--primary-soft); color: var(--primary-dark); }
    .message.err { background: var(--error-soft); color: var(--error); }

    .doc-tools {
      display: grid;
      gap: 9px;
      margin: 14px 0 12px;
    }

    .brand-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 14px;
    }

    .brand-tab {
      min-height: 30px;
      padding: 0 9px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 650;
    }

    .brand-tab.active {
      border-color: rgba(23, 107, 135, 0.28);
      background: var(--primary-soft);
      color: var(--primary-dark);
    }

    .doc-group {
      margin: 16px 0 18px;
    }

    .doc-group:first-child { margin-top: 0; }

    .doc-group-title {
      margin: 0 0 7px;
      color: var(--text-soft);
      font-size: 11px;
      font-weight: 780;
      text-transform: uppercase;
    }

    .doc-row {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      padding: 10px;
      border: 1px solid var(--line-soft);
      border-radius: 8px;
      background: #fff;
      text-align: left;
      margin-bottom: 7px;
    }

    .doc-row:hover {
      border-color: #c6d6e5;
      background: #fbfdff;
    }

    .doc-name {
      min-width: 0;
      color: var(--text);
      font-size: 13px;
      font-weight: 720;
      overflow-wrap: anywhere;
    }

    .doc-meta {
      color: var(--text-soft);
      font-size: 12px;
      margin-top: 3px;
      overflow-wrap: anywhere;
    }

    .count-badge,
    .status-badge {
      align-self: start;
      padding: 3px 7px;
      border-radius: 6px;
      background: var(--panel-soft);
      color: var(--text-muted);
      font-size: 11px;
      font-weight: 760;
      white-space: nowrap;
    }

    .status-badge.good {
      background: var(--verify-soft);
      color: #1f6845;
    }

    .status-badge.warn {
      background: var(--warn-soft);
      color: #8a5a12;
    }

    .main {
      min-height: 0;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      overflow: hidden;
    }

    .results-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      scroll-behavior: smooth;
    }

    #results {
      display: flex;
      flex-direction: column;
      gap: 20px;
      min-height: 100%;
    }

    .ask-area {
      padding: 16px 20px 24px;
      border-top: 1px solid var(--line);
      background: rgba(244, 247, 250, 0.94);
      backdrop-filter: blur(14px);
    }

    .message-row {
      display: flex;
      flex-direction: column;
      max-width: 820px;
      width: 100%;
      margin: 0 auto;
    }

    .message-bubble {
      max-width: 85%;
      padding: 14px 18px;
      border-radius: 18px;
      font-size: 15px;
      line-height: 1.55;
      position: relative;
      animation: msgIn 0.25s ease-out;
    }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .user-row { align-items: flex-end; }
    .user-bubble {
      background: var(--primary);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .ai-row { align-items: flex-start; }
    .ai-bubble {
      background: var(--panel);
      color: var(--text);
      border-bottom-left-radius: 4px;
      box-shadow: 0 2px 8px rgba(23, 33, 43, 0.04);
      border: 1px solid var(--line-soft);
    }

    .msg-meta {
      font-size: 11px;
      color: var(--text-soft);
      margin-bottom: 5px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .user-row .msg-meta { text-align: right; margin-right: 4px; }
    .ai-row .msg-meta { text-align: left; margin-left: 4px; }

    .question-shell {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .question-input {
      width: 100%;
      min-height: 76px;
      resize: vertical;
      border: 0;
      border-bottom: 1px solid var(--line-soft);
      outline: 0;
      padding: 14px 15px;
      color: var(--text);
      font-size: 15px;
      line-height: 1.45;
    }

    .question-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 12px;
    }

    .context-hint {
      min-width: 0;
      color: var(--text-soft);
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .primary-btn,
    .ghost-btn {
      min-height: 38px;
      border-radius: 7px;
      font-weight: 760;
    }

    .primary-btn {
      padding: 0 16px;
      border: 1px solid var(--primary);
      background: var(--primary);
      color: #fff;
    }

    .primary-btn:hover { background: var(--primary-dark); }

    .ghost-btn {
      padding: 0 12px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text-muted);
    }

    .ghost-btn:hover {
      border-color: #c6d6e5;
      color: var(--text);
    }


    .progress {
      display: none;
      height: 3px;
      overflow: hidden;
      border-radius: 999px;
      background: var(--panel-strong);
      margin-bottom: 14px;
    }

    .progress.show { display: block; }

    .progress::before {
      content: "";
      display: block;
      width: 42%;
      height: 100%;
      background: var(--primary);
      animation: load 1.1s ease-in-out infinite;
    }

    @keyframes load {
      0% { transform: translateX(-120%); }
      100% { transform: translateX(260%); }
    }

    .empty-state {
      display: grid;
      gap: 10px;
      justify-items: center;
      text-align: center;
      max-width: 680px;
      padding: 40px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.68);
      margin: auto;
    }

    .empty-title {
      font-size: 18px;
      font-weight: 780;
    }

    .empty-copy {
      color: var(--text-muted);
      line-height: 1.55;
    }


    .source-heading {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 18px 0 9px;
    }

    .source-heading h2 {
      margin: 0;
      font-size: 13px;
      font-weight: 780;
    }

    .source-heading span {
      color: var(--text-soft);
      font-size: 12px;
    }

    .source-list {
      display: grid;
      gap: 10px;
    }

    .source-card {
      width: 100%;
      padding: 0;
      text-align: left;
      overflow: hidden;
    }

    .source-card.active {
      border-color: rgba(23, 107, 135, 0.45);
      box-shadow: 0 0 0 3px rgba(23, 107, 135, 0.1);
    }

    .source-card-head {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px 8px;
    }

    .source-doc {
      color: var(--primary-dark);
      font-size: 13px;
      font-weight: 780;
      overflow-wrap: anywhere;
    }

    .source-rank {
      padding: 3px 7px;
      border-radius: 6px;
      background: var(--panel-soft);
      color: var(--text-muted);
      font-size: 11px;
      font-weight: 780;
      white-space: nowrap;
    }

    .source-context-label {
      display: block;
      padding: 0 14px 6px;
      color: var(--text-soft);
      font-size: 11px;
      font-weight: 760;
      text-transform: uppercase;
    }

    .source-text {
      overflow: hidden;
      padding: 0 14px 12px;
      color: #243342;
      font-size: 13px;
      line-height: 1.55;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
    }

    .source-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 0 14px 12px;
    }

    .tag {
      padding: 3px 7px;
      border-radius: 6px;
      background: var(--panel-soft);
      color: var(--text-muted);
      font-size: 11px;
      font-weight: 700;
      overflow-wrap: anywhere;
    }

    .tag.good { background: var(--verify-soft); color: #1f6845; }
    .tag.warn { background: var(--warn-soft); color: #8a5a12; }

    .evidence-card {
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
    }

    .evidence-title {
      color: var(--text);
      font-size: 14px;
      font-weight: 780;
      overflow-wrap: anywhere;
    }

    .evidence-meta {
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }

    .verification-block {
      margin-top: 14px;
      padding: 12px;
      border-radius: 8px;
      background: var(--verify-soft);
      color: #163d2b;
    }

    .verification-label {
      margin-bottom: 6px;
      color: #1f6845;
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .verification-text {
      font-size: 14px;
      line-height: 1.55;
    }

    .meta-row {
      display: grid;
      grid-template-columns: 92px 1fr;
      gap: 10px;
      color: var(--text-muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .meta-row strong {
      color: var(--text-soft);
      font-weight: 760;
    }

    .meta-row code {
      font-family: var(--mono);
      color: var(--text);
      overflow-wrap: anywhere;
    }

    .source-note {
      margin-top: 14px;
      padding: 11px 12px;
      border-radius: 8px;
      background: var(--warn-soft);
      color: var(--text-muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .excerpt {
      margin-top: 14px;
      padding: 12px;
      border-radius: 8px;
      background: #f8fbfd;
      color: #243342;
      font-size: 12px;
      line-height: 1.56;
      max-height: 320px;
      overflow: auto;
      white-space: pre-wrap;
    }

    .copy-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 12px;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 1180px) {
      body { overflow: auto; }
      .app { min-height: auto; }
      .workspace {
        grid-template-columns: 280px 1fr;
        min-height: calc(100vh - 56px);
      }
      .sidebar-body { height: auto; max-height: none; }
    }

    @media (max-width: 820px) {
      .topbar {
        align-items: stretch;
        flex-direction: column;
        height: auto;
        padding: 12px;
      }
      .brand-lockup,
      .top-actions { min-width: 0; width: 100%; }
      .status-strip { justify-content: flex-start; width: 100%; }
      .workspace { grid-template-columns: 1fr; }
      .sidebar-body { height: auto; max-height: none; }
      .panel { border-right: 0; border-bottom: 1px solid var(--line); }
      .main { min-height: 720px; }
      .question-footer { align-items: stretch; flex-direction: column; }
      .primary-btn { width: 100%; }
      .copy-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand-lockup">
        <div class="mark">M</div>
        <div>
          <div class="app-title">MedEq RAG</div>
          <div class="app-subtitle" id="t-subtitle">Сервисная документация с проверяемыми источниками</div>
        </div>
      </div>
      <div class="status-strip">
        <span class="dot" id="api-dot"></span>
        <span id="api-status">Проверка API...</span>
      </div>
      <div class="top-actions">
        <div class="lang-switch" aria-label="Language">
          <button class="seg-btn" id="btn-ru" type="button" data-lang="ru">RU</button>
          <button class="seg-btn" id="btn-en" type="button" data-lang="en">EN</button>
        </div>
      </div>
    </header>

    <div class="workspace">
      <aside class="panel">
        <div class="panel-head">
          <div class="section-title" id="t-docs-title">Документы</div>
          <div class="section-note" id="t-docs-note">Выберите коллекцию или загрузите новый PDF.</div>
        </div>
        <div class="sidebar-body">
          <label class="field-label" for="upload-brand" id="t-upload-brand">Коллекция для загрузки</label>
          <select class="select" id="upload-brand"></select>

          <div class="upload-box" id="drop-zone">
            <label class="upload-label">
              <span>
                <span class="upload-main" id="t-upload-main">Загрузить PDF</span>
                <span class="upload-sub" id="t-upload-sub">Нажмите или перетащите файл</span>
              </span>
              <span class="upload-action" id="t-upload-action">Выбрать</span>
              <input type="file" id="file-input" accept=".pdf,.PDF" />
            </label>
          </div>
          <div class="message" id="upload-msg"></div>

          <div class="doc-tools">
            <label class="field-label" for="doc-filter" id="t-filter-label">Фильтр документов</label>
            <input class="input" id="doc-filter" type="search" placeholder="FDR, service manual..." />
          </div>

          <div class="brand-tabs" id="brand-tabs"></div>
          <div id="doc-list"></div>
        </div>
      </aside>

      <main class="main">
        <section class="results-area" id="results-area">
          <div id="results"></div>
          <div class="progress" id="progress"></div>
        </section>

        <section class="ask-area">
          <div class="question-shell">
            <textarea class="question-input" id="query" rows="1" placeholder="Задайте вопрос..."></textarea>
            <div class="question-footer">
              <div class="mode-switch" aria-label="Mode">
                <button class="seg-btn active" id="mode-ask" type="button" data-mode="ask">Ask AI</button>
                <button class="seg-btn" id="mode-search" type="button" data-mode="search">Search</button>
              </div>
              <div class="context-hint" id="context-hint">Поиск по всем коллекциям</div>
              <button class="primary-btn" id="search-btn" type="button">Спросить</button>
            </div>
          </div>
        </section>
      </main>

    </div>
  </div>

  <script>
    const API = 'http://localhost:8000';

    let lang = localStorage.getItem('medeq_lang') || 'ru';
    let mode = localStorage.getItem('medeq_mode') || 'ask';
    let selectedBrand = null;
    let collections = [];
    let documents = [];
    let currentSources = [];
    let chatHistory = [];

    const TR = {
      ru: {
        subtitle: 'Сервисная документация с проверяемыми источниками',
        apiChecking: 'Проверка API...',
        apiOk: 'API доступен',
        apiDown: 'API недоступен: запустите uvicorn api.main:app --port 8000',
        docsTitle: 'Документы',
        docsNote: 'Выберите коллекцию или загрузите новый PDF.',
        uploadBrand: 'Коллекция для загрузки',
        uploadMain: 'Загрузить PDF',
        uploadSub: 'Нажмите или перетащите файл',
        uploadAction: 'Выбрать',
        filterLabel: 'Фильтр документов',
        filterPlaceholder: 'FDR, service manual...',

    function tr(key) {
      return (TR[lang] && TR[lang][key]) || TR.en[key] || key;
    }

    function esc(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function cleanLabel(value) {
      return String(value || '').replace(/_/g, ' ');
    }

    function sourceDocName(source) {
      return source?.metadata?.doc_name || source?.metadata?.source_filename || 'N/A';
    }

    function inferPage(source) {
      const metadata = source?.metadata || {};
      const pageFields = ['page_start', 'page', 'page_number', 'source_page'];
      for (const key of pageFields) {
        if (metadata[key] !== undefined && metadata[key] !== null && metadata[key] !== '') {
          return { value: metadata[key], confidence: 'metadata' };
        }
      }

      const text = source?.text || '';
      const matches = [...text.matchAll(/---\s*Page\s+(\d+)\s*---/gi)];
      if (matches.length) {
        return { value: matches[0][1], confidence: 'text' };
      }
      return { value: null, confidence: 'missing' };
    }

    function currentQueryTerms() {
      const stopWords = new Set([
        'что', 'как', 'или', 'это', 'этот', 'эта', 'оно', 'для', 'при', 'and', 'the', 'this',
        'that', 'what', 'how', 'does', 'work', 'signal', 'означает', 'работает', 'какой'
      ]);
      const query = window.lastQuery || document.getElementById('query')?.value || '';
      return [...new Set(String(query).toLowerCase().match(/[a-zа-я0-9_-]{3,}/gi) || [])]
        .filter((term) => !stopWords.has(term));
    }

    function answerTerms() {
      const answer = window.lastAnswer || '';
      return [...new Set(String(answer).toLowerCase().match(/[a-zа-я0-9_-]{4,}/gi) || [])]
        .filter((term) => !['сигнал', 'когда', 'этот', 'модуле', 'используется', 'answer', 'source'].includes(term))
        .slice(0, 18);
    }

    function splitEvidenceSentences(text) {
      return stripPageMarkers(text)
        .replace(/\s+/g, ' ')
        .split(/(?<=[.!?])\s+|(?=\b[A-Z0-9_-]{2,}\s*\()/)
        .map((part) => part.trim())
        .filter((part) => part.length > 24);
    }

    function pickEvidenceSnippet(source, maxSentences = 2) {
      const sentences = splitEvidenceSentences(source?.text || '');
      if (!sentences.length) return stripPageMarkers(source?.text || '').slice(0, 420);

      const terms = currentQueryTerms();
      const scored = sentences.map((sentence, index) => {
        const lower = sentence.toLowerCase();
        const score = terms.reduce((sum, term) => sum + (lower.includes(term.toLowerCase()) ? 3 : 0), 0)
          + (/\b[A-Z0-9_-]{3,}\b/.test(sentence) ? 1 : 0)
          - index * 0.01;
        return { sentence, score, index };
      });

      const selected = scored
        .sort((a, b) => b.score - a.score)
        .slice(0, maxSentences)
        .sort((a, b) => a.index - b.index)
        .map((item) => item.sentence);

      return compactAroundTerms(selected.join(' '), 430);
    }

    function compactAroundTerms(text, maxLength = 360) {
      const clean = String(text || '').replace(/\s+/g, ' ').trim();
      if (clean.length <= maxLength) return clean;

      const terms = [...currentQueryTerms(), ...answerTerms()]
        .sort((a, b) => b.length - a.length);
      const lower = clean.toLowerCase();
      const hit = terms.find((term) => lower.includes(term.toLowerCase()));
      const center = hit ? lower.indexOf(hit.toLowerCase()) : Math.floor(clean.length / 2);
      const start = Math.max(0, center - Math.floor(maxLength * 0.14));
      const end = Math.min(clean.length, start + maxLength);
      const prefix = start > 0 ? '…' : '';
      const suffix = end < clean.length ? '…' : '';
      return `${prefix}${clean.slice(start, end).trim()}${suffix}`;
    }

    function sourceEvidenceScore(source) {
      const text = stripPageMarkers(source?.text || '').toLowerCase();
      const terms = [...currentQueryTerms(), ...answerTerms()];
      return terms.reduce((sum, term) => {
        const escaped = term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        const matches = text.match(new RegExp(escaped, 'g'));
        return sum + (matches ? matches.length : 0);
      }, 0);
    }

    function orderSourcesForUsefulness(sources) {
      return [...sources].sort((a, b) => sourceEvidenceScore(b) - sourceEvidenceScore(a));
    }

    function setLang(nextLang) {
      lang = nextLang;
      localStorage.setItem('medeq_lang', lang);
      renderStaticText();
      renderBrands();
      renderDocs();
      renderResultsFromState();
    }

    function setMode(nextMode) {
      mode = nextMode;
      localStorage.setItem('medeq_mode', mode);
      document.getElementById('mode-ask').classList.toggle('active', mode === 'ask');
      document.getElementById('mode-search').classList.toggle('active', mode === 'search');
      document.getElementById('search-btn').textContent = mode === 'ask' ? tr('ask') : tr('search');
    }

    function renderStaticText() {
      document.documentElement.lang = lang;
      document.getElementById('t-subtitle').textContent = tr('subtitle');
      document.getElementById('t-docs-title').textContent = tr('docsTitle');
      document.getElementById('t-docs-note').textContent = tr('docsNote');
      document.getElementById('t-upload-brand').textContent = tr('uploadBrand');
      document.getElementById('t-upload-main').textContent = tr('uploadMain');
      document.getElementById('t-upload-sub').textContent = tr('uploadSub');
      document.getElementById('t-upload-action').textContent = tr('uploadAction');
      document.getElementById('t-filter-label').textContent = tr('filterLabel');
      document.getElementById('doc-filter').placeholder = tr('filterPlaceholder');
      document.getElementById('query').placeholder = tr('questionPlaceholder');
      document.getElementById('btn-ru').classList.toggle('active', lang === 'ru');
      document.getElementById('btn-en').classList.toggle('active', lang === 'en');
      document.getElementById('mode-ask').textContent = 'Ask AI';
      document.getElementById('mode-search').textContent = 'Search';
      setMode(mode);
      updateContextHint();
    }

    function setApiStatus(ok) {
      const dot = document.getElementById('api-dot');
      const status = document.getElementById('api-status');
      dot.classList.toggle('ok', ok);
      status.textContent = ok ? tr('apiOk') : tr('apiDown');
    }

    async function checkApi() {
      try {
        const response = await fetch(`${API}/health`);
        setApiStatus(response.ok);
      } catch {
        setApiStatus(false);
      }
    }

    async function loadData() {
      await Promise.all([loadCollections(), loadDocuments()]);
      renderBrands();
      renderDocs();
      updateContextHint();
    }

    async function loadCollections() {
      try {
        const response = await fetch(`${API}/collections`);
        const data = await response.json();
        collections = (data.collections || []).filter(Boolean).sort();
      } catch {
        collections = [];
      }
    }

    async function loadDocuments() {
      try {
        const response = await fetch(`${API}/documents`);
        const data = await response.json();
        documents = data.documents || [];
      } catch {
        documents = [];
      }
    }

    function renderBrands() {
      const tabs = document.getElementById('brand-tabs');
      const uploadSelect = document.getElementById('upload-brand');

      tabs.innerHTML = '';
      const allBtn = document.createElement('button');
      allBtn.type = 'button';
      allBtn.className = `brand-tab ${selectedBrand === null ? 'active' : ''}`;
      allBtn.textContent = tr('all');
      allBtn.addEventListener('click', () => selectBrand(null));
      tabs.appendChild(allBtn);

      collections.forEach((collection) => {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = `brand-tab ${selectedBrand === collection ? 'active' : ''}`;
        button.textContent = cleanLabel(collection);
        button.addEventListener('click', () => selectBrand(collection));
        tabs.appendChild(button);
      });

      uploadSelect.innerHTML = `<option value="">${esc(tr('brandDefault'))}</option>`;
      collections.forEach((collection) => {
        const option = document.createElement('option');
        option.value = collection;
        option.textContent = cleanLabel(collection);
        uploadSelect.appendChild(option);
      });
    }

    function selectBrand(collection) {
      selectedBrand = collection;
      renderBrands();
      renderDocs();
      updateContextHint();
    }

    function updateContextHint() {
      const hint = document.getElementById('context-hint');
      hint.textContent = selectedBrand
        ? `${tr('selectedCollection')}: ${cleanLabel(selectedBrand)}`
        : tr('allCollections');
    }

    function renderDocs() {
      const list = document.getElementById('doc-list');
      const filter = document.getElementById('doc-filter').value.trim().toLowerCase();
      const visible = documents.filter((doc) => {
        if (selectedBrand && doc.collection_name !== selectedBrand) return false;
        if (!filter) return true;
        const haystack = [
          doc.doc_name,
          doc.collection_name,
          doc.metadata?.document_type,
          doc.metadata?.equipment_type,
          doc.metadata?.model
        ].join(' ').toLowerCase();
        return haystack.includes(filter);
      });

      if (!visible.length) {
        list.innerHTML = `
          <div class="empty-state" style="padding:18px;">
            <div class="empty-title" style="font-size:14px;">${esc(tr('noDocs'))}</div>
            <div class="empty-copy" style="font-size:12px;">${esc(tr('noDocsCopy'))}</div>
          </div>`;
        return;
      }

      const groups = {};
      visible.forEach((doc) => {
        const key = doc.collection_name || 'general';
        (groups[key] = groups[key] || []).push(doc);
      });

      list.innerHTML = Object.entries(groups).sort().map(([group, items]) => `
        <section class="doc-group">
          <h2 class="doc-group-title">${esc(cleanLabel(group))}</h2>
          ${items.sort((a, b) => String(a.doc_name).localeCompare(String(b.doc_name))).map((doc) => `
            <button class="doc-row" type="button" data-doc-collection="${esc(doc.collection_name || '')}">
              <span>
                <span class="doc-name">${esc(doc.doc_name || 'N/A')}</span>
                <span class="doc-meta">${esc(doc.metadata?.document_type || doc.metadata?.equipment_type || doc.metadata?.model || 'PDF')}</span>
              </span>
              <span class="count-badge">${Number(doc.chunk_count || 0)} ${esc(tr('chunks'))}</span>
            </button>
          `).join('')}
        </section>
      `).join('');

      list.querySelectorAll('.doc-row').forEach((row) => {
        row.addEventListener('click', () => {
          const collection = row.getAttribute('data-doc-collection') || null;
          if (collection) selectBrand(collection);
        });
      });
    }

    function renderEmpty() {
      document.getElementById('results').innerHTML = `
        <div class="empty-state">
          <div class="empty-title">${esc(tr('emptyTitle'))}</div>
          <div class="empty-copy">${esc(tr('emptyCopy'))}</div>
        </div>`;
    }

    function renderResultsFromState() {
      const results = document.getElementById('results');
      if (chatHistory.length === 0) {
        renderEmpty();
        return;
      }

      results.innerHTML = chatHistory.map((msg) => `
        <div class="message-row ${msg.role === 'user' ? 'user-row' : 'ai-row'}">
          <div class="msg-meta">${msg.role === 'user' ? 'Вы' : 'AI'}</div>
          <div class="message-bubble ${msg.role === 'user' ? 'user-bubble' : 'ai-bubble'}">
            ${esc(msg.text)}
          </div>
        </div>
      `).join('');
      
      scrollToBottom();
    }

    function scrollToBottom() {
      const area = document.getElementById('results-area');
      area.scrollTop = area.scrollHeight;
    }

    function renderSourceCard(source, index) {
      const metadata = source.metadata || {};
      const page = inferPage(source);
      const docName = sourceDocName(source);
      const collection = source.collection_name || metadata.collection_name || '';
      const docType = metadata.document_type || metadata.equipment_type || '';
      const model = metadata.model || '';
      const active = index === selectedSourceIndex ? 'active' : '';
      const snippet = pickEvidenceSnippet(source);

      return `
        <button class="source-card ${active}" type="button" data-index="${index}">
          <span class="source-card-head">
            <span class="source-doc">${esc(docName)}</span>
            <span class="source-rank">#${esc(source.fusion_rank || index + 1)}</span>
          </span>
          <span class="source-context-label">${esc(tr('relevantQuote'))}</span>
          <span class="source-text">${esc(snippet)}</span>
          <span class="source-tags">
            ${collection ? `<span class="tag">${esc(cleanLabel(collection))}</span>` : ''}
            ${docType ? `<span class="tag">${esc(cleanLabel(docType))}</span>` : ''}
            ${model ? `<span class="tag">${esc(model)}</span>` : ''}
            <span class="tag ${page.value ? 'good' : 'warn'}">${page.value ? `${esc(tr('page'))} ${esc(page.value)}` : esc(tr('pageUnknown'))}</span>
          </span>
        </button>`;
    }


    function stripPageMarkers(text) {
      return String(text || '').replace(/---\s*Page\s+\d+\s*---/gi, '').trim();
    }

    async function copyText(text) {
      try {
        await navigator.clipboard.writeText(text);
        showMessage(tr('copied'), 'ok');
      } catch {
        showMessage(text, 'info');
      }
    }

    async function doSearch() {
      const query = document.getElementById('query').value.trim();
      if (!query) return;

      const progress = document.getElementById('progress');
      const button = document.getElementById('search-btn');
      const input = document.getElementById('query');
      const endpoint = mode === 'ask' ? '/ask' : '/search';
      const payload = { query, top_k: 5 };
      if (selectedBrand) payload.collection_name = selectedBrand;

      // Add user message to history
      chatHistory.push({ role: 'user', text: query });
      renderResultsFromState();

      input.value = '';
      input.rows = 1;
      progress.classList.add('show');
      button.disabled = true;
      
      window.lastQuery = query;
      currentSources = [];

      try {
        const response = await fetch(`${API}${endpoint}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        if (!response.ok) {
          const error = await response.json().catch(() => ({}));
          throw new Error(error.detail || response.statusText);
        }
        const data = await response.json();
        const answer = mode === 'ask' ? (data.answer || '') : (tr('rawLabel') + ': ' + (data.results || []).length);
        currentSources = orderSourcesForUsefulness(mode === 'ask' ? (data.sources || []) : (data.results || []));
        
        chatHistory.push({ role: 'assistant', text: answer });
        renderResultsFromState();
      } catch (error) {
        chatHistory.push({ role: 'assistant', text: tr('errorPrefix') + ': ' + error.message });
        renderResultsFromState();
      } finally {
        progress.classList.remove('show');
        button.disabled = false;
      }
    }

    async function uploadFile(file) {
      const brand = document.getElementById('upload-brand').value;
      if (!brand) {
        showMessage(tr('noBrand'), 'err');
        return;
      }

      showMessage(tr('uploading'), 'info');
      const form = new FormData();
      form.append('file', file);

      try {
        const response = await fetch(`${API}/ingest?brand=${encodeURIComponent(brand)}`, {
          method: 'POST',
          body: form
        });
        if (!response.ok) {
          const error = await response.json().catch(() => ({}));
          throw new Error(error.detail || response.statusText);
        }
        const data = await response.json();
        showMessage(`${tr('uploadOk')}: ${data.filename} (${data.chunks_ingested || 0} ${tr('chunks')})`, 'ok');
        document.getElementById('file-input').value = '';
        await loadData();
      } catch (error) {
        showMessage(`${tr('errorPrefix')}: ${error.message}`, 'err');
      }
    }

    function showMessage(text, type) {
      const message = document.getElementById('upload-msg');
      message.textContent = text;
      message.className = `message show ${type}`;
    }

    function bindEvents() {
      document.querySelectorAll('[data-lang]').forEach((button) => {
        button.addEventListener('click', () => setLang(button.dataset.lang));
      });
      document.querySelectorAll('[data-mode]').forEach((button) => {
        button.addEventListener('click', () => setMode(button.dataset.mode));
      });
      document.getElementById('search-btn').addEventListener('click', doSearch);
      document.getElementById('query').addEventListener('keydown', (event) => {
        if (event.key === 'Enter' && !event.shiftKey) {
          event.preventDefault();
          doSearch();
        }
      });
      document.getElementById('query').addEventListener('input', (event) => {
        const el = event.target;
        el.rows = 1;
        const newRows = Math.min(5, Math.floor(el.scrollHeight / 20));
        el.rows = newRows > 1 ? newRows : 1;
      });
      document.getElementById('doc-filter').addEventListener('input', renderDocs);
      document.getElementById('file-input').addEventListener('change', (event) => {
        if (event.target.files[0]) uploadFile(event.target.files[0]);
      });

      const dropZone = document.getElementById('drop-zone');
      dropZone.addEventListener('dragover', (event) => {
        event.preventDefault();
        dropZone.classList.add('drag');
      });
      dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag'));
      dropZone.addEventListener('drop', (event) => {
        event.preventDefault();
        dropZone.classList.remove('drag');
        if (event.dataTransfer.files[0]) uploadFile(event.dataTransfer.files[0]);
      });
    }

    async function init() {
      bindEvents();
      renderStaticText();
      renderEmpty();
      await checkApi();
      await loadData();
    }

    init();
  </script>
