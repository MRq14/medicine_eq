<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Equipment RAG Search</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1rem;
            opacity: 0.9;
        }

        .main-panel {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            margin-bottom: 30px;
        }

        .search-section {
            margin-bottom: 40px;
        }

        .brand-filter {
            margin-bottom: 20px;
        }

        .brand-filter label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: #333;
        }

        .brand-tabs {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .brand-tab {
            padding: 8px 16px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
            color: #555;
            font-size: 0.9rem;
        }

        .brand-tab:hover {
            border-color: #667eea;
            color: #667eea;
        }

        .brand-tab.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        input[type="text"] {
            flex: 1;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            padding: 14px 32px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background: #5568d3;
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .ingest-section {
            border-top: 1px solid #e0e0e0;
            padding-top: 30px;
        }

        .ingest-box {
            border: 2px dashed #667eea;
            border-radius: 8px;
            padding: 30px;
            text-align: center;
            background: #f9f9ff;
            cursor: pointer;
            transition: background 0.3s;
        }

        .ingest-box:hover {
            background: #f0f0ff;
        }

        .ingest-box input {
            display: none;
        }

        .ingest-box label {
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .ingest-icon {
            font-size: 2.5rem;
        }

        .results {
            margin-top: 30px;
        }

        .result-item {
            background: #f9f9f9;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 15px;
            transition: background 0.3s;
        }

        .result-item:hover {
            background: #f0f0f0;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 10px;
        }

        .result-title {
            font-weight: 600;
            color: #333;
            flex: 1;
        }

        .result-rank {
            background: #667eea;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .result-text {
            color: #555;
            line-height: 1.6;
            margin-bottom: 10px;
        }

        .result-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            font-size: 0.85rem;
        }

        .tag {
            background: #e0e0e0;
            padding: 4px 10px;
            border-radius: 4px;
            color: #666;
        }

        .score {
            color: #999;
            font-size: 0.85rem;
        }

        .status {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
        }

        .status.show {
            display: block;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .documents-section {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 30px;
        }

        .documents-section h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .brand-section {
            margin-bottom: 30px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            background: #fafafa;
        }

        .brand-section-title {
            font-weight: 600;
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.1rem;
        }

        .doc-item {
            background: white;
            padding: 12px 15px;
            border-radius: 6px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #e0e0e0;
        }

        .doc-name {
            font-weight: 500;
            color: #333;
            font-size: 0.95rem;
        }

        .doc-count {
            background: #667eea;
            color: white;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
        }

        .loading {
            display: none;
            text-align: center;
            color: #667eea;
            font-weight: 600;
            margin: 20px 0;
        }

        .loading.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏥 Medical Equipment RAG</h1>
            <p class="subtitle">Search medical equipment documentation by brand</p>
        </header>

        <div class="main-panel">
            <div class="search-section">
                <div id="status" class="status"></div>

                <div class="brand-filter">
                    <label>Filter by Brand:</label>
                    <div class="brand-tabs" id="brandTabs">
                        <div class="brand-tab active" onclick="setSelectedBrand(null)">All Brands</div>
                    </div>
                </div>

                <div class="search-box">
                    <input type="text" id="query" placeholder="Search medical equipment docs..." />
                    <button onclick="search()">Search</button>
                </div>

                <div id="loading" class="loading">Searching...</div>

                <div id="results" class="results"></div>
            </div>

            <div class="ingest-section">
                <h3 style="margin-bottom: 15px; color: #333;">Upload Medical Equipment PDF</h3>
                <div style="margin-bottom: 15px;">
                    <label style="display:block; margin-bottom:6px; font-weight:600; color:#333;">Brand:</label>
                    <select id="uploadBrand" style="padding:10px 14px; border:2px solid #e0e0e0; border-radius:8px; font-size:1rem; width:100%; max-width:300px;">
                        <option value="">-- select brand --</option>
                    </select>
                </div>
                <div class="ingest-box">
                    <label>
                        <div class="ingest-icon">📄</div>
                        <span>Click to select a PDF or drag and drop</span>
                        <input type="file" id="file" accept=".pdf" onchange="handleFileSelect(event)" />
                    </label>
                </div>
                <div id="ingestStatus" style="margin-top: 15px;"></div>
            </div>
        </div>

        <div class="documents-section">
            <h2>📚 Ingested Documents by Brand</h2>
            <div id="documents"></div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000';
        let selectedBrand = null;
        let brandCollections = {};

        async function loadCollections() {
            try {
                const response = await fetch(`${API_BASE}/collections`);
                if (!response.ok) {
                    console.error('Failed to load collections');
                    return;
                }
                const data = await response.json();

                // Extract brand names from collection names (e.g., medical_docs_fuji → fuji)
                const brands = new Set();
                for (const name of data.collections || []) {
                    if (name.startsWith('medical_docs_')) {
                        const brand = name.replace('medical_docs_', '');
                        if (brand !== 'general') {
                            brands.add(brand);
                        }
                    }
                }

                // Update brand tabs
                const brandTabs = document.getElementById('brandTabs');
                const tabs = [
                    '<div class="brand-tab active" onclick="setSelectedBrand(null, this)">All Brands</div>'
                ];
                for (const brand of Array.from(brands).sort()) {
                    const displayBrand = brand.replace(/_/g, ' ').split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
                    tabs.push(`<div class="brand-tab" onclick="setSelectedBrand('${brand}', this)">${displayBrand}</div>`);
                }
                brandTabs.innerHTML = tabs.join('');

                // Update upload brand dropdown
                const uploadBrand = document.getElementById('uploadBrand');
                uploadBrand.innerHTML = '<option value="">-- select brand --</option>';
                for (const brand of Array.from(brands).sort()) {
                    const displayBrand = brand.replace(/_/g, ' ').split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
                    uploadBrand.innerHTML += `<option value="${brand}">${displayBrand}</option>`;
                }

                // Store for later use
                brandCollections = Object.fromEntries(
                    Array.from(brands).map(brand => [`medical_docs_${brand}`, brand])
                );
            } catch (error) {
                console.error('Error loading collections:', error);
            }
        }

        function setSelectedBrand(brand, el) {
            selectedBrand = brand;
            document.querySelectorAll('.brand-tab').forEach(tab => tab.classList.remove('active'));
            el.classList.add('active');
        }

        async function search() {
            const query = document.getElementById('query').value.trim();
            if (!query) {
                showStatus('Enter a search query', 'error');
                return;
            }

            const loading = document.getElementById('loading');
            const results = document.getElementById('results');

            loading.classList.add('show');
            results.innerHTML = '';

            try {
                const payload = { query, top_k: 5 };
                if (selectedBrand) {
                    payload.collection_name = `medical_docs_${selectedBrand}`;
                }

                const response = await fetch(`${API_BASE}/search`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || 'Search failed');
                }

                const data = await response.json();

                if (data.results.length === 0) {
                    results.innerHTML = '<p style="color: #999; text-align: center;">No results found</p>';
                    return;
                }

                results.innerHTML = data.results.map(result => `
                    <div class="result-item">
                        <div class="result-header">
                            <div class="result-title">${escapeHtml(result.text.substring(0, 100))}</div>
                            <div class="result-rank">Rank #${result.fusion_rank}</div>
                        </div>
                        <div class="result-text">${escapeHtml(result.text)}</div>
                        <div class="result-meta">
                            <span class="tag">Brand: ${escapeHtml(result.collection_name?.replace('medical_docs_', '').replace(/_/g, ' ').toUpperCase() || 'N/A')}</span>
                            <span class="tag">Doc: ${escapeHtml(result.metadata.doc_name || 'N/A')}</span>
                            ${result.bm25_score ? `<span class="score">BM25: ${(result.bm25_score).toFixed(2)}</span>` : ''}
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                showStatus(`Search error: ${error.message}`, 'error');
            } finally {
                loading.classList.remove('show');
            }
        }

        async function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            const brand = document.getElementById('uploadBrand').value;
            if (!brand) {
                document.getElementById('ingestStatus').innerHTML = '<div class="status show error">Select a brand before uploading</div>';
                return;
            }

            const formData = new FormData();
            formData.append('file', file);

            const statusDiv = document.getElementById('ingestStatus');
            statusDiv.innerHTML = '<div class="status show info">Uploading and processing...</div>';

            try {
                const response = await fetch(`${API_BASE}/ingest?brand=${encodeURIComponent(brand)}`, {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || 'Ingest failed');
                }

                const data = await response.json();
                const brand = data.doc_group || 'unknown';
                statusDiv.innerHTML = `<div class="status show success">✓ Ingested ${data.chunks_ingested} chunks from ${data.filename} (Brand: ${brand})</div>`;
                document.getElementById('file').value = '';

                // Refresh collections and documents
                await loadCollections();
                loadDocuments();
            } catch (error) {
                statusDiv.innerHTML = `<div class="status show error">✗ ${error.message}</div>`;
            }
        }

        async function loadDocuments() {
            try {
                const response = await fetch(`${API_BASE}/documents`);
                if (!response.ok) throw new Error('Failed to fetch documents');

                const data = await response.json();
                const docs = document.getElementById('documents');

                if (data.documents.length === 0) {
                    docs.innerHTML = '<p style="color: #999;">No documents ingested yet</p>';
                    return;
                }

                // Group by collection (brand)
                const grouped = {};
                for (const doc of data.documents) {
                    const brand = doc.collection_name || 'general';
                    if (!grouped[brand]) {
                        grouped[brand] = [];
                    }
                    grouped[brand].push(doc);
                }

                // Render grouped by brand
                let html = '';
                for (const [brand, brandDocs] of Object.entries(grouped).sort()) {
                    const displayBrand = brand.replace('medical_docs_', '').replace(/_/g, ' ').toUpperCase();
                    html += `
                        <div class="brand-section">
                            <div class="brand-section-title">${escapeHtml(displayBrand)}</div>
                            ${brandDocs.map(doc => `
                                <div class="doc-item">
                                    <div>
                                        <div class="doc-name">${escapeHtml(doc.doc_name)}</div>
                                        <div style="font-size: 0.8rem; color: #666; margin-top: 4px;">Type: ${escapeHtml(doc.metadata.document_type || 'N/A')}</div>
                                    </div>
                                    <div class="doc-count">${doc.chunk_count} chunks</div>
                                </div>
                            `).join('')}
                        </div>
                    `;
                }
                docs.innerHTML = html;
            } catch (error) {
                console.error('Error loading documents:', error);
            }
        }

        function showStatus(message, type) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = `status show ${type}`;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Drag and drop
        const ingestBox = document.querySelector('.ingest-box');
        ingestBox.addEventListener('dragover', e => {
            e.preventDefault();
            ingestBox.style.background = '#e0e0ff';
        });

        ingestBox.addEventListener('dragleave', () => {
            ingestBox.style.background = '#f9f9ff';
        });

        ingestBox.addEventListener('drop', e => {
            e.preventDefault();
            ingestBox.style.background = '#f9f9ff';
            const file = e.dataTransfer.files[0];
            if (file && file.type === 'application/pdf') {
                const input = document.getElementById('file');
                input.files = e.dataTransfer.files;
                handleFileSelect({ target: { files: [file] } });
            }
        });

        // Initialize
        document.addEventListener('DOMContentLoaded', async () => {
            await loadCollections();
            loadDocuments();
        });

        // Allow Enter to search
        document.getElementById('query').addEventListener('keypress', e => {
            if (e.key === 'Enter') search();
        });
    </script>
</body>
</html>
